spring:
  application:
    name: qilu
  datasource:
    url: jdbc:mysql://localhost:3306/qilu?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Singapore
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorted: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:qilu-jwt-secret-please-change-in-production-2026-0414-1233}
  expire: ${JWT_EXPIRE:3600000}